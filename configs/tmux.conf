set -g history-limit 100000
set -g status-position top
set -g base-index 1
setw -g pane-base-index 1
set -g extended-keys on
set -g mouse on
set -g renumber-windows on
set -g default-terminal "tmux-256color"
# Pass cursor style sequences through to the outer terminal:
# Ss = set cursor style (bar/block/underline, blinking/steady)
# Se = reset cursor to default style
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -sg escape-time 10

set -s set-clipboard on
set -g allow-passthrough

# Forward Shift+Enter (CSI u) to inner apps (e.g. Claude Code line breaks)
set -as terminal-features ',*:extkeys'
bind -n S-Enter send-keys "\e[13;2u"

##### Prefix like GNU screen (easier than Ctrl-b on mobile)
unbind C-b
set -g prefix C-a
bind C-a send-prefix   # press Ctrl-a twice to send it to the app (handy in shells)

# Session/window/pane management
bind R source-file ~/.tmux.conf \; display-message "tmux reloaded"
bind s command-prompt -I "#S" "rename-session -- '%%'"
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind t new-window -c "#{pane_current_path}"
bind w kill-pane
bind q detach-client
bind p choose-tree -Zw

# Splits
bind d split-window -h -c "#{pane_current_path}"
bind D split-window -v -c "#{pane_current_path}"
bind \{ previous-window
bind \} next-window
bind [ select-pane -t :.-
bind ] select-pane -t :.+

# Panes: direct navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 5

# Phone-friendly duplicates (prefix + arrow)
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# Others
bind z resize-pane -Z
bind v copy-mode

# Copy mode: stay in place after yanking (don't jump to bottom)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection

##### Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
